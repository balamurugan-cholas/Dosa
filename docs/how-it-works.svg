<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1300" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111625" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 7 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 7 5 L 0 8.5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 7 5 L 0 8.5 z" fill="#6B7280" />
    </marker>

    <style>
      .node-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #E2E8F0; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .sub-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; font-weight: 400; text-anchor: middle; dominant-baseline: middle; }
      .title-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 18px; fill: #FFFFFF; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .subtitle-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; fill: #94A3B8; font-weight: 400; text-anchor: middle; dominant-baseline: middle; }
      .section-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748B; font-weight: 600; text-anchor: middle; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1000" height="1300" fill="url(#bgGrad)" />

  <text x="500" y="45" class="title-text">How Dosa Works</text>
  <text x="500" y="70" class="subtitle-text">Interview transcription → AI answers → optional VS Code insertion</text>

  <!-- ================= EDGES ================= -->
  <path d="M 500,150 L 500,185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow-gray)" />
  <path d="M 500,255 L 500,290" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 500,360 L 500,395" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- branch to screen analysis -->
  <path d="M 650,428 C 720,410 780,370 800,330" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-gray)" />

  <path d="M 500,465 L 500,500" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 500,570 L 500,605" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 500,675 L 500,710" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- section divider -->
  <line x1="60" y1="825" x2="940" y2="825" stroke="#1E293B" stroke-width="2" />

  <path d="M 500,780 L 500,845" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-gray)" />

  <!-- two buttons converge -->
  <path d="M 355,915 L 355,945 L 645,945 L 645,915" fill="none" stroke="#6B7280" stroke-width="2" />
  <path d="M 500,945 L 500,975" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow-gray)" />

  <path d="M 500,1045 L 500,1080" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 500,1150 L 500,1185" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- ================= NODES ================= -->

  <!-- System Audio -->
  <rect x="350" y="90" width="300" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="112" class="node-text">System Audio</text>
  <text x="500" y="132" class="sub-text">getDisplayMedia() → downsampled to 16kHz PCM</text>

  <!-- Deepgram -->
  <rect x="350" y="187" width="300" height="68" rx="10" fill="#064E3B" stroke="#059669" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="211" class="node-text">Deepgram Nova-3</text>
  <text x="500" y="232" class="sub-text">live transcription over WebSocket</text>

  <!-- Live Transcript -->
  <rect x="350" y="292" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="316" class="node-text">Live Transcript</text>
  <text x="500" y="337" class="sub-text">shown in the Dosa overlay as you speak</text>

  <!-- Answer trigger -->
  <rect x="350" y="397" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="421" class="node-text">Answer / Auto-Answer</text>
  <text x="500" y="442" class="sub-text">Alt+W, or auto-triggers 2s after silence</text>

  <!-- side note: screen analysis -->
  <rect x="770" y="255" width="180" height="65" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" opacity="0.9" />
  <text x="860" y="278" class="node-text" style="font-size:12px">Screen Analysis</text>
  <text x="860" y="296" class="sub-text" style="font-size:10px">Alt+Enter → screenshot</text>
  <text x="860" y="310" class="sub-text" style="font-size:10px">→ Gemini 2.5 Flash</text>

  <!-- OpenRouter -->
  <rect x="350" y="502" width="300" height="68" rx="10" fill="#064E3B" stroke="#059669" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="526" class="node-text">OpenRouter</text>
  <text x="500" y="547" class="sub-text">any model, streamed token by token</text>

  <!-- Answer rendered -->
  <rect x="350" y="607" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="631" class="node-text">Answer Rendered in Dosa</text>
  <text x="500" y="652" class="sub-text">first-person, candidate voice</text>

  <!-- Section label -->
  <text x="500" y="815" class="section-text">FOR CODING ANSWERS — VS CODE BRIDGE</text>

  <!-- Two buttons -->
  <rect x="205" y="847" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="355" y="871" class="node-text">"VS Code" Button</text>
  <text x="355" y="892" class="sub-text">inserts code as-is at cursor</text>

  <rect x="495" y="847" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="645" y="871" class="node-text">"Continue" Button</text>
  <text x="645" y="892" class="sub-text">merges into your current file</text>

  <!-- diff engine -->
  <rect x="350" y="977" width="300" height="68" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="1001" class="node-text">diff.ts engine</text>
  <text x="500" y="1022" class="sub-text">line-level, block-aware diff</text>

  <!-- vscode-bridge -->
  <rect x="270" y="1082" width="460" height="68" rx="10" fill="#1D3A5F" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="1106" class="node-text">vscode-bridge.cjs</text>
  <text x="500" y="1127" class="sub-text">relays the edit over localhost</text>

  <!-- extension -->
  <rect x="270" y="1187" width="460" height="68" rx="10" fill="#1D3A5F" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)" />
  <text x="500" y="1211" class="node-text">Dosa Bridge (VS Code extension)</text>
  <text x="500" y="1232" class="sub-text">applies the edit at your cursor, in your active file</text>
</svg>
