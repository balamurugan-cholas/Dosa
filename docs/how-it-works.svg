<svg viewBox="0 0 1160 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5b6472"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f9d55"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="800" fill="#0f1420"/>

  <text x="580" y="42" text-anchor="middle" fill="#f4f6fb" font-size="26" font-weight="700">How Dosa Works</text>
  <text x="580" y="66" text-anchor="middle" fill="#9aa4b6" font-size="14">Interview transcription → AI answers → optional VS Code insertion</text>

  <!-- Column headers -->
  <text x="180" y="105" text-anchor="middle" fill="#7c8698" font-size="13" letter-spacing="1">CAPTURE</text>
  <text x="580" y="105" text-anchor="middle" fill="#7c8698" font-size="13" letter-spacing="1">DOSA APP (ELECTRON)</text>
  <text x="980" y="105" text-anchor="middle" fill="#7c8698" font-size="13" letter-spacing="1">AI SERVICES</text>

  <!-- System Audio box -->
  <rect x="80" y="130" width="200" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="180" y="155" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">System Audio</text>
  <text x="180" y="174" text-anchor="middle" fill="#8b96a8" font-size="11">getDisplayMedia()</text>

  <!-- Arrow down to downsample -->
  <line x1="180" y1="190" x2="180" y2="228" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="230" width="200" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="180" y="255" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Downsample</text>
  <text x="180" y="274" text-anchor="middle" fill="#8b96a8" font-size="11">16kHz PCM chunks</text>

  <line x1="280" y1="260" x2="480" y2="260" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="380" y="248" text-anchor="middle" fill="#6f9bff" font-size="10">Electron IPC</text>

  <!-- Deepgram -->
  <rect x="880" y="230" width="200" height="60" rx="10" fill="#122a20" stroke="#1f9d55"/>
  <text x="980" y="255" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Deepgram Nova-3</text>
  <text x="980" y="274" text-anchor="middle" fill="#8fd6ac" font-size="11">WebSocket streaming</text>

  <line x1="680" y1="260" x2="878" y2="260" stroke="#1f9d55" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Transcript box (center) -->
  <rect x="480" y="230" width="200" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="580" y="255" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Live Transcript</text>
  <text x="580" y="274" text-anchor="middle" fill="#8b96a8" font-size="11">renderer state → UI</text>

  <line x1="980" y1="290" x2="980" y2="300" stroke="#1f9d55" stroke-width="0"/>
  <path d="M880,260 C 700,340 660,340 590,290" fill="none" stroke="#1f9d55" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Answer trigger -->
  <line x1="580" y1="290" x2="580" y2="328" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="330" width="200" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="580" y="355" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Answer / Auto-Answer</text>
  <text x="580" y="374" text-anchor="middle" fill="#8b96a8" font-size="11">Alt+W or 2s auto-trigger</text>

  <line x1="680" y1="360" x2="878" y2="360" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- OpenRouter -->
  <rect x="880" y="330" width="200" height="60" rx="10" fill="#122a20" stroke="#1f9d55"/>
  <text x="980" y="355" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">OpenRouter</text>
  <text x="980" y="374" text-anchor="middle" fill="#8fd6ac" font-size="11">streamed AI answer</text>

  <path d="M880,360 C 760,440 700,440 590,392" fill="none" stroke="#1f9d55" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Rendered answer -->
  <line x1="580" y1="392" x2="580" y2="430" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="440" y="432" width="280" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="580" y="457" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Answer Rendered in Dosa</text>
  <text x="580" y="476" text-anchor="middle" fill="#8b96a8" font-size="11">first-person, candidate voice</text>

  <!-- Screen Analysis branch -->
  <rect x="80" y="330" width="200" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="180" y="355" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Screenshot Capture</text>
  <text x="180" y="374" text-anchor="middle" fill="#8b96a8" font-size="11">Alt+Enter</text>
  <line x1="280" y1="360" x2="478" y2="360" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <rect x="880" y="130" width="200" height="60" rx="10" fill="#122a20" stroke="#1f9d55"/>
  <text x="980" y="155" text-anchor="middle" fill="#e8ecf4" font-size="14" font-weight="600">Gemini 2.5 Flash</text>
  <text x="980" y="174" text-anchor="middle" fill="#8fd6ac" font-size="11">screen analysis</text>
  <path d="M280,345 C 500,150 700,150 878,160" fill="none" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M980,190 C 980,320 700,420 590,460" fill="none" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Divider -->
  <line x1="60" y1="530" x2="1100" y2="530" stroke="#26304a" stroke-width="1.5"/>
  <text x="580" y="522" text-anchor="middle" fill="#7c8698" font-size="12" letter-spacing="1">FOR CODING ANSWERS — VS CODE BRIDGE</text>

  <!-- VS Code bridge row -->
  <line x1="580" y1="492" x2="580" y2="560" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3"/>

  <rect x="380" y="562" width="180" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="470" y="587" text-anchor="middle" fill="#e8ecf4" font-size="13" font-weight="600">"VS Code" Button</text>
  <text x="470" y="605" text-anchor="middle" fill="#8b96a8" font-size="10">insert as-is at cursor</text>

  <rect x="600" y="562" width="180" height="60" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="690" y="587" text-anchor="middle" fill="#e8ecf4" font-size="13" font-weight="600">"Continue" Button</text>
  <text x="690" y="605" text-anchor="middle" fill="#8b96a8" font-size="10">merge into current file</text>

  <line x1="470" y1="480" x2="470" y2="560" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="690" y1="480" x2="690" y2="560" stroke="#5b6472" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <line x1="690" y1="622" x2="690" y2="650" stroke="#5b6472" stroke-width="2"/>
  <line x1="470" y1="622" x2="470" y2="650" stroke="#5b6472" stroke-width="2"/>
  <line x1="470" y1="650" x2="690" y2="650" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="500" y="652" width="160" height="50" rx="10" fill="#1a2233" stroke="#33405a"/>
  <text x="580" y="672" text-anchor="middle" fill="#e8ecf4" font-size="12" font-weight="600">diff.ts engine</text>
  <text x="580" y="689" text-anchor="middle" fill="#8b96a8" font-size="9">line-level diff, block-aware</text>

  <line x1="580" y1="702" x2="580" y2="720" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="420" y="722" width="320" height="60" rx="10" fill="#101b2e" stroke="#2f6fed"/>
  <text x="580" y="747" text-anchor="middle" fill="#e8ecf4" font-size="13" font-weight="600">vscode-bridge.cjs (localhost)</text>
  <text x="580" y="765" text-anchor="middle" fill="#6f9bff" font-size="10">→ Dosa Bridge VS Code extension → active file</text>
</svg>
